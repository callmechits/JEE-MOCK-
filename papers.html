<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Papers — JEEAdv26</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e17;--surface:#111827;--border:#1e2d40;--accent:#00c2ff;--accent2:#ff6b35;--text:#e2e8f0;--muted:#64748b;--phy:#3b82f6;--chem:#10b981;--math:#f59e0b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.3;pointer-events:none;}
  nav{position:sticky;top:0;z-index:100;background:rgba(10,14,23,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;}
  .nav-logo{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--accent);}.nav-logo span{color:var(--accent2);}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:0.82rem;margin-left:1.5rem;text-transform:uppercase;letter-spacing:0.05em;}
  .nav-links a:hover,.nav-links a.active{color:var(--accent);}
  .main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:2rem;}
  h1{font-size:2rem;font-weight:700;margin-bottom:2rem;}
  .filter-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:2rem;width:fit-content;}
  .filter-tab{padding:0.55rem 1.2rem;font-size:0.78rem;font-weight:600;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;background:transparent;border:none;font-family:inherit;border-right:1px solid var(--border);}
  .filter-tab:last-child{border-right:none;}.filter-tab.active{background:var(--accent);color:var(--bg);}
  .papers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem;}
  .paper-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1.5rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;text-decoration:none;color:inherit;display:block;}
  .paper-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--phy),var(--chem),var(--math));}
  .paper-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .paper-card.live::before{background:var(--accent2);}
  .badge{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;padding:0.2rem 0.6rem;border-radius:2px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
  .badge-live{background:rgba(255,107,53,0.2);color:var(--accent2);border:1px solid rgba(255,107,53,0.4);}
  .badge-upcoming{background:rgba(0,194,255,0.1);color:var(--accent);border:1px solid rgba(0,194,255,0.3);}
  .badge-past{background:rgba(100,116,139,0.15);color:var(--muted);border:1px solid var(--border);}
  .paper-meta{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;}
  .paper-title{font-size:1.05rem;font-weight:600;margin-bottom:0.4rem;}
  .paper-date{font-size:0.8rem;color:var(--muted);margin-bottom:1rem;}
  .paper-stats{display:flex;gap:1rem;}.paper-stat{font-size:0.78rem;color:var(--muted);}.paper-stat strong{color:var(--text);}
  .paper-action{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .paper-action-btn{font-size:0.8rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em;}
  .paper-action-btn.orange{color:var(--accent2);}
  .empty{text-align:center;padding:4rem;color:var(--muted);grid-column:1/-1;}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">JEE<span>ADV</span>26</div>
  <div class="nav-links">
    <a href="index.html">Home</a><a href="leaderboard.html">Leaderboard</a>
  </div>
</nav>
<div class="main">
  <h1>All Mock Papers</h1>
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
    <button class="filter-tab" onclick="setFilter('live',this)">Live</button>
    <button class="filter-tab" onclick="setFilter('upcoming',this)">Upcoming</button>
    <button class="filter-tab" onclick="setFilter('past',this)">Past</button>
  </div>
  <div class="papers-grid" id="papers-grid"><div class="empty">Loading...</div></div>
</div>
<script src="js/storage.js?v=3"></script>
<script>
let filter='all', allPapers=[], allAttempts=[];
function setFilter(f,el){filter=f;document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}
function getStatus(p){const now=Date.now(),s=new Date(p.startTime).getTime(),e=new Date(p.endTime).getTime();if(now>=s&&now<=e)return 'live';if(now<s)return 'upcoming';return 'past';}
function render(){
  const filtered=filter==='all'?allPapers:allPapers.filter(p=>getStatus(p)===filter);
  const grid=document.getElementById('papers-grid');
  if(!filtered.length){grid.innerHTML='<div class="empty">No papers found.</div>';return;}
  grid.innerHTML=filtered.map(p=>{
    const status=getStatus(p);
    const badge=status==='live'?'badge-live':status==='upcoming'?'badge-upcoming':'badge-past';
    const badgeText=status==='live'?'● LIVE':status==='upcoming'?'Upcoming':'Completed';
    const action=status==='live'?'Attempt Now →':status==='past'?'View Results →':'Opens '+new Date(p.startTime).toLocaleDateString('en-IN');
    const ac=status==='live'?'orange':'';
    const href=status==='live'?`exam.html?id=${p.id}`:status==='past'?`results.html?id=${p.id}`:'#';
    const att=allAttempts.filter(a=>a.paperId===p.id).length;
    return `<a href="${href}" class="paper-card ${status==='live'?'live':''}">
      <div class="paper-meta"><span class="badge ${badge}">${badgeText}</span><span style="font-size:0.72rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;">Mock #${p.number||'?'}</span></div>
      <div class="paper-title">${p.title}</div>
      <div class="paper-date">${new Date(p.startTime).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})} · 3 Hours</div>
      ${p.description?`<div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.75rem;">${p.description}</div>`:''}
      <div class="paper-stats"><div class="paper-stat"><strong>${p.questions?.length||0}</strong> Questions</div><div class="paper-stat"><strong>${att}</strong> Attempts</div></div>
      <div class="paper-action"><span class="paper-action-btn ${ac}">${action}</span></div>
    </a>`;
  }).join('');
}
async function init(){
  [allPapers, allAttempts] = await Promise.all([Storage.getPapers(), Storage.getAllAttempts()]);
  render();
}
init();
</script>
</body>
</html>
