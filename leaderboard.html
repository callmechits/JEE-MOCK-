<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leaderboard — JEEAdv26</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e17;--surface:#111827;--border:#1e2d40;--accent:#00c2ff;--accent2:#ff6b35;--gold:#ffd700;--text:#e2e8f0;--muted:#64748b;--phy:#3b82f6;--chem:#10b981;--math:#f59e0b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.3;pointer-events:none;}
  nav{position:sticky;top:0;z-index:100;background:rgba(10,14,23,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;}
  .nav-logo{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--accent);}.nav-logo span{color:var(--accent2);}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:0.82rem;margin-left:1.5rem;text-transform:uppercase;letter-spacing:0.05em;}
  .nav-links a:hover,.nav-links a.active{color:var(--accent);}
  .main{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:2rem;}
  h1{font-size:2rem;font-weight:700;margin-bottom:2rem;}
  .tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:2rem;width:fit-content;}
  .tab{padding:0.6rem 1.4rem;font-size:0.82rem;font-weight:600;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;transition:all 0.15s;background:transparent;border:none;font-family:inherit;border-right:1px solid var(--border);}
  .tab:last-child{border-right:none;}.tab.active{background:var(--accent);color:var(--bg);}
  select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:0.6rem 1rem;border-radius:4px;font-family:inherit;font-size:0.88rem;cursor:pointer;margin-bottom:1.5rem;}
  select:focus{outline:none;border-color:var(--accent);}select option{background:var(--surface);}
  .podium{display:flex;justify-content:center;align-items:flex-end;gap:1rem;margin-bottom:3rem;padding:1.5rem;}
  .pod-item{text-align:center;flex:1;max-width:180px;}
  .pod-block{border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;}
  .pod-1{height:120px;background:linear-gradient(180deg,rgba(255,215,0,0.2),rgba(255,215,0,0.05));border:1px solid rgba(255,215,0,0.4);}
  .pod-2{height:90px;background:linear-gradient(180deg,rgba(192,192,192,0.15),rgba(192,192,192,0.03));border:1px solid rgba(192,192,192,0.3);}
  .pod-3{height:70px;background:linear-gradient(180deg,rgba(205,127,50,0.15),rgba(205,127,50,0.03));border:1px solid rgba(205,127,50,0.3);}
  .pod-name{font-weight:700;font-size:0.9rem;margin-top:0.5rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pod-score{font-family:'IBM Plex Mono',monospace;font-size:0.85rem;color:var(--muted);}
  .lb-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .lb-table thead tr{background:rgba(0,194,255,0.05);border-bottom:1px solid var(--border);}
  .lb-table th{padding:0.75rem 1rem;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
  .lb-table th.c{text-align:center;}
  .lb-table td{padding:0.85rem 1rem;border-bottom:1px solid rgba(30,45,64,0.7);font-size:0.88rem;vertical-align:middle;}
  .lb-table tr:last-child td{border-bottom:none;}.lb-table tr:hover td{background:rgba(255,255,255,0.02);}
  .rank{font-family:'IBM Plex Mono',monospace;font-weight:700;text-align:center;}
  .rank.r1{color:var(--gold);}.rank.r2{color:#c0c0c0;}.rank.r3{color:#cd7f32;}
  .sc{font-family:'IBM Plex Mono',monospace;font-size:0.88rem;text-align:center;}
  .phy{color:var(--phy);}.chem{color:var(--chem);}.math{color:var(--math);}
  .tot{font-family:'IBM Plex Mono',monospace;font-size:1rem;font-weight:700;text-align:center;}
  .empty{text-align:center;padding:4rem 2rem;color:var(--muted);font-size:0.9rem;}
  footer{position:relative;z-index:1;text-align:center;padding:2rem;border-top:1px solid var(--border);color:var(--muted);font-size:0.8rem;margin-top:3rem;}
  footer a{color:var(--accent2);text-decoration:none;}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">JEE<span>ADV</span>26</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="leaderboard.html" class="active">Leaderboard</a>
    <a href="papers.html">Papers</a>
    <a href="admin.html">Admin</a>
  </div>
</nav>
<div class="main">
  <h1>Leaderboard</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overall',this)">Overall</button>
    <button class="tab" onclick="switchTab('paper',this)">Per Paper</button>
  </div>
  <div id="tab-overall">
    <div id="podium-overall" class="podium" style="display:none;"></div>
    <table class="lb-table"><thead><tr><th class="c">#</th><th>Student</th><th class="c">PHY</th><th class="c">CHEM</th><th class="c">MATH</th><th class="c">TOTAL</th><th class="c">Papers</th></tr></thead><tbody id="overall-body"><tr><td colspan="7"><div class="empty">Loading...</div></td></tr></tbody></table>
  </div>
  <div id="tab-paper" style="display:none;">
    <select id="paper-select" onchange="renderPaperLb()"><option value="">— Select a Paper —</option></select>
    <div id="podium-paper" class="podium" style="display:none;"></div>
    <table class="lb-table"><thead><tr><th class="c">#</th><th>Student</th><th class="c">PHY</th><th class="c">CHEM</th><th class="c">MATH</th><th class="c">TOTAL</th><th class="c">Submitted</th></tr></thead><tbody id="paper-body"></tbody></table>
  </div>
</div>
<footer>Built for <a href="https://reddit.com/r/JEEAdv26dailyupdates" target="_blank">r/JEEAdv26dailyupdates</a> 🎯</footer>
<script src="js/storage.js?v=3"></script>
<script>
function switchTab(name,el){
  document.getElementById('tab-overall').style.display=name==='overall'?'block':'none';
  document.getElementById('tab-paper').style.display=name==='paper'?'block':'none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
}
function renderPodium(data,containerId){
  const c=document.getElementById(containerId);
  if(data.length<1){c.style.display='none';return;}
  c.style.display='flex';
  const order=[data[1],data[0],data[2]].filter(Boolean);
  const bc=['pod-2','pod-1','pod-3'],em=['🥈','🥇','🥉'];
  c.innerHTML=order.map((e,i)=>`<div class="pod-item"><div class="pod-block ${bc[i]}">${em[i]}</div><div class="pod-name">${e.username}</div><div class="pod-score">${e.total} pts</div></div>`).join('');
}
function rowHtml(e,i){
  const rs=i===0?'r1':i===1?'r2':i===2?'r3':'';
  const sym=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
  return `<tr><td><div class="rank ${rs}">${sym}</div></td><td><strong>${e.username}</strong></td><td><div class="sc phy">${e.phy}</div></td><td><div class="sc chem">${e.chem}</div></td><td><div class="sc math">${e.math}</div></td><td><div class="tot">${e.total}</div></td><td style="font-family:'IBM Plex Mono',monospace;font-size:0.78rem;text-align:center;color:var(--muted);">${e.count||''}</td></tr>`;
}
async function init(){
  const data=await Storage.getOverallLeaderboard();
  renderPodium(data,'podium-overall');
  const tbody=document.getElementById('overall-body');
  tbody.innerHTML=data.length?data.map(rowHtml).join(''):'<tr><td colspan="7"><div class="empty">No attempts yet. Be the first!</div></td></tr>';
  const papers=(await Storage.getPapers()).filter(p=>new Date(p.endTime).getTime()<Date.now());
  const sel=document.getElementById('paper-select');
  papers.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.title;sel.appendChild(o);});
}
async function renderPaperLb(){
  const paperId=document.getElementById('paper-select').value;
  if(!paperId)return;
  const data=await Storage.getPaperLeaderboard(paperId);
  renderPodium(data,'podium-paper');
  const tbody=document.getElementById('paper-body');
  tbody.innerHTML=data.length?data.map((e,i)=>{
    const rs=i===0?'r1':i===1?'r2':i===2?'r3':'';const sym=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
    return `<tr><td><div class="rank ${rs}">${sym}</div></td><td><strong>${e.username}</strong></td><td><div class="sc phy">${e.phy}</div></td><td><div class="sc chem">${e.chem}</div></td><td><div class="sc math">${e.math}</div></td><td><div class="tot">${e.total}</div></td><td style="font-size:0.75rem;color:var(--muted);text-align:center;">${new Date(e.submittedAt).toLocaleDateString('en-IN')}</td></tr>`;
  }).join(''):'<tr><td colspan="7"><div class="empty">No submissions for this paper yet.</div></td></tr>';
}
init();
</script>
</body>
</html>
